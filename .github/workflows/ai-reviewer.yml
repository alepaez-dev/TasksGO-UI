name: AI Reviewer

# Claude-powered, bug-focused PR review. Runs only when a maintainer applies the
# `ai-reviewer` label, and re-runs on new commits while that label is present.
# On every run it skips any issue it has already commented on this PR.
#
# SECURITY MODEL (read before editing the trigger):
#   - Uses `pull_request_target` so the review still works on PRs from forks and has
#     access to the ANTHROPIC_API_KEY secret + write permission to post comments.
#   - This is gated by the `ai-reviewer` label PLUS a guard step that requires the user who applied
#     it to have write/admin access. (Triage-role users CAN apply labels without write access, so the
#     label alone is not a trust boundary — the guard step is.) An external contributor therefore
#     cannot trigger the FIRST run on their own. Auto re-runs on later pushes are additionally gated
#     on a trusted `author_association` (see the job `if`), so an external fork author can't keep
#     re-triggering paid runs by pushing — a maintainer re-applies the label to re-review such a PR.
#     Remove the label to stop all further runs.
#   - We DELIBERATELY never check out or execute the PR's head code. `actions/checkout`
#     defaults to the trusted base branch here; the script reads the PR diff through the
#     GitHub API (data, not code) and sends it to Claude. Do not add a checkout of
#     `github.event.pull_request.head.*`, and do not run any PR-controlled scripts.
#
#   Prefer to avoid `pull_request_target` entirely (e.g. you only ever get same-repo PRs)?
#   Change the two `pull_request_target` lines below to `pull_request`. The reviewer will
#   then run with secrets only on same-repo PRs (fork PRs get no secret and are skipped).

on:
  pull_request_target:
    types: [labeled, synchronize, reopened]

permissions:
  # contents:write is REQUIRED for resolveReviewThread (auto-resolving verified fixes). With
  # contents:read the mutation fails "FORBIDDEN: Resource not accessible by integration" (observed on
  # PR #150 @0229ef3;). Do NOT downgrade to read.
  # Safe here: this workflow NEVER checks out or executes PR-head code (see the SECURITY MODEL note
  # above) and passes only API data to Claude, so a fork author has no path to abuse the elevated token.
  contents: write
  pull-requests: write # post review comments + resolve threads
  # TODO(hardening, deferred): isolate this write scope from the code that reads untrusted PR input.
  #   EXTERNAL — a dedicated GitHub App / fine-grained PAT scoped to contents:write just for the
  #       resolveReviewThread call (the natural pattern once managing multiple repos, backend, AI repo, etc).
  #   Safe to defer: the real boundary is that this workflow never executes PR-head code (see above).
  #   ai-reviewer-guard.yml adds two hard checks (no PR-head checkout, --ignore-scripts) + a BEST-EFFORT
  #   sink scan (a tripwire for honest mistakes, trivially evadable — not a guarantee). Mark it a REQUIRED
  #   status check on main.

concurrency:
  group: ai-reviewer-pr-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  review:
    # Run when the `ai-reviewer` label is added (any PR — but the first step then requires the
    # labeler to have write acces]s), or — for trusted authors only — on new commits / reopen while
    # the label is present. Gating the auto re-run on author_association stops an external fork author
    # from re-triggering paid Claude calls by pushing commits; to re-review an external PR, a
    # maintainer re-applies the label.
    if: >-
      (github.event.action == 'labeled' && github.event.label.name == 'ai-reviewer') ||
      (github.event.action != 'labeled' &&
       contains(github.event.pull_request.labels.*.name, 'ai-reviewer') &&
       contains(fromJSON('["OWNER", "MEMBER", "COLLABORATOR"]'), github.event.pull_request.author_association))
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      # A `labeled` event can be fired by anyone who can apply labels — and GitHub's Triage role can
      # apply labels WITHOUT code-write access. So before spending anything, require the user who
      # applied the label to actually have write/admin. Runs first (before checkout/install) so a
      # disallowed trigger fails in ~2s with zero Claude spend. Skipped on synchronize/reopened,
      # which are already gated on the PR author's association in the job `if:` above.
      - name: Require write access to start a review
        if: github.event.action == 'labeled'
        uses: actions/github-script@3a2844b7e9c422d3c10d287c895573f7108da1b3 # v9.0.0
        with:
          script: |
            const { data } = await github.rest.repos.getCollaboratorPermissionLevel({
              owner: context.repo.owner,
              repo: context.repo.repo,
              username: context.payload.sender.login,
            });
            // GitHub collapses triage -> 'read' and maintain -> 'write' in this field, so this
            // admits write/admin/maintain and blocks triage/read/none.
            if (!['admin', 'write'].includes(data.permission)) {
              core.setFailed(
                `@${context.payload.sender.login} has '${data.permission}' permission; the ai-reviewer ` +
                  `label must be applied by a user with write access. (Triage can apply labels but not trigger a run.)`,
              );
            }

      # Default ref on pull_request_target = the trusted base branch (NOT the PR head).
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version-file: .nvmrc
          cache: npm
          cache-dependency-path: .github/ai-reviewer/package-lock.json

      - name: Install reviewer dependencies
        working-directory: .github/ai-reviewer
        # --ignore-scripts: none of these deps need install hooks, so disable them as
        # defense-in-depth against a compromised dependency auto-running code at install time.
        run: npm ci --ignore-scripts

      - name: Run AI bug review
        working-directory: .github/ai-reviewer
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: node review.mjs
