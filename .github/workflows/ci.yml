name: CI

on:
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  validate:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version-file: '.nvmrc'
          cache: 'npm'

      - run: npm ci

      - run: npm audit --omit=dev

      - run: npm run build

      - run: npx tsc --noEmit --project packages/ds/tsconfig.json

      - run: npx tsc --noEmit --project packages/ds/tsconfig.stories.json

      - run: npm run test:ci

  a11y:
    runs-on: ubuntu-latest
    needs: validate
    timeout-minutes: 10

    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version-file: '.nvmrc'
          cache: 'npm'

      - run: npm ci

      - name: Cache Playwright browsers
        id: pw-cache
        uses: actions/cache@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v6.1.0
        with:
          path: ~/.cache/ms-playwright
          key: pw-${{ runner.os }}-${{ hashFiles('package-lock.json') }}

      - name: Install Playwright system deps
        run: npx playwright install-deps chromium

      - name: Install Playwright chromium (cache miss)
        if: steps.pw-cache.outputs.cache-hit != 'true'
        run: bash .github/scripts/install-playwright-browser.sh

      - run: npm run build-storybook -w packages/ds

      - name: Serve Storybook and run a11y tests
        run: |
          npx http-server packages/ds/storybook-static --port 6006 --silent &
          npx wait-on http://127.0.0.1:6006 --timeout 30000
          npm run test:a11y -w packages/ds -- --url http://127.0.0.1:6006

  e2e:
    runs-on: ubuntu-latest
    needs: validate
    timeout-minutes: 15

    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version-file: '.nvmrc'
          cache: 'npm'

      - run: npm ci

      - name: Cache Playwright browsers
        id: pw-cache
        uses: actions/cache@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v6.1.0
        with:
          path: ~/.cache/ms-playwright
          key: pw-${{ runner.os }}-${{ hashFiles('package-lock.json') }}

      - name: Install Playwright system deps
        run: npx playwright install-deps chromium

      - name: Install Playwright chromium (cache miss)
        if: steps.pw-cache.outputs.cache-hit != 'true'
        run: bash .github/scripts/install-playwright-browser.sh

      - run: npm run build-storybook -w packages/ds

      - name: Serve Storybook and run e2e tests
        run: |
          npx http-server packages/ds/storybook-static --port 6006 --silent &
          npx wait-on http://127.0.0.1:6006 --timeout 30000
          npm run test:e2e -w packages/ds

      - name: Upload Playwright report
        if: failure()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: playwright-report
          path: packages/ds/playwright-report/
          retention-days: 14
