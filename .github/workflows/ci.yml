name: CI

on:
  pull_request:
    branches: [main]

jobs:
  validate:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version-file: '.nvmrc'
          cache: 'npm'

      - run: npm ci
      - run: npm rebuild

      - run: npx tsc --noEmit --project packages/ds/tsconfig.json

      - run: npm run test:ci

      - run: npm run build
