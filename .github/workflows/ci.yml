name: CI

on:
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  validate:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version-file: '.nvmrc'
          cache: 'npm'

      - run: npm ci

      - run: npm audit --omit=dev

      - run: npm run build

      - run: npx tsc --noEmit --project packages/ds/tsconfig.json

      - run: npm run test:ci

  a11y:
    runs-on: ubuntu-latest
    needs: validate

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version-file: '.nvmrc'
          cache: 'npm'

      - run: npm ci

      - run: npx playwright install --with-deps chromium

      - run: npm run build-storybook -w packages/ds

      - name: Serve Storybook and run a11y tests
        run: |
          npx http-server packages/ds/storybook-static --port 6006 --silent &
          npx wait-on http://127.0.0.1:6006 --timeout 30000
          npm run test:a11y -w packages/ds -- --url http://127.0.0.1:6006

  e2e:
    runs-on: ubuntu-latest
    needs: validate

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version-file: '.nvmrc'
          cache: 'npm'

      - run: npm ci

      - run: npx playwright install --with-deps chromium

      - run: npm run build-storybook -w packages/ds

      - name: Serve Storybook and run e2e tests
        run: |
          npx http-server packages/ds/storybook-static --port 6006 --silent &
          npx wait-on http://127.0.0.1:6006 --timeout 30000
          npm run test:e2e -w packages/ds

      - name: Upload Playwright report
        if: failure()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: playwright-report
          path: packages/ds/playwright-report/
          retention-days: 14
