name: AI Reviewer Guard

on:
  # No `paths:` filter — runs on EVERY PR so it can be a required status check. A path-filtered
  # required check never reports on unrelated PRs and blocks them; this is cheap (checkout + grep).
  pull_request:

permissions:
  contents: read

jobs:
  guard:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Enforce reviewer security invariants
        run: |
          set -uo pipefail
          shopt -s nullglob
          fail=0
          note() { echo "::error::$1"; fail=1; }
          # Scans run on comment-stripped content so they match real config, not prose — a comment that
          # mentions `npm ci` or the head dir must not trip the guard.
          strip() { sed -E 's/[[:space:]]*#.*$//' "$1"; }

          for wf in .github/workflows/ai-reviewer*.yml; do
            [ -f "$wf" ] || continue
            case "$wf" in */ai-reviewer-guard.yml) continue ;; esac # the guard is the checker, not a reviewer
            S="$(strip "$wf")"

            if printf '%s\n' "$S" | grep -qE '(pull_request\.head|head\.(sha|ref)|github\.head_ref)'; then
              # (a) the write token must never persist into an attacker-controlled worktree.
              if ! printf '%s\n' "$S" | grep -qE 'persist-credentials:[[:space:]]*false'; then
                note "$wf checks out PR-head without persist-credentials: false — the token would live in an attacker-controlled worktree."
              fi
              # (b) head must land in an isolated path: — never overlay the trusted base checkout.
              hp="$(printf '%s\n' "$S" | grep -A3 -E '(head\.(sha|ref)|pull_request\.head|github\.head_ref)' \
                     | grep -oE 'path:[[:space:]]*[^[:space:]]+' | head -1 | sed -E 's/path:[[:space:]]*//' || true)"
              if [ -z "$hp" ]; then
                note "$wf checks out PR-head without an isolated path: — it overlays the trusted base, so later steps would run attacker code."
              fi
              # (c) execution must stay in the trusted base: every working-directory under .github/ai-reviewer,
              #     and the head path may appear ONLY in its path: decl and an (UPPERCASE) env var — never in a
              #     run:/cd/working-directory. Catches `working-directory: _head`, `run: node _head/x`, a multiline
              #     `cd _head`, and even head overlaid onto the reviewer's own trusted dir.
              if printf '%s\n' "$S" | grep -oE 'working-directory:[[:space:]]*[^[:space:]]+' | grep -qvE 'working-directory:[[:space:]]*\.github/ai-reviewer'; then
                note "$wf sets a working-directory outside .github/ai-reviewer while checking out PR-head — it may execute head code."
              fi
              if [ -n "$hp" ]; then
                hpre="$(printf '%s' "$hp" | sed -E 's/[][(){}.^$*+?|\\/-]/\\&/g')" # treat the path literally in regex
                if printf '%s\n' "$S" | grep -nE "(^|[^[:alnum:]_])${hpre}([^[:alnum:]_]|$)" \
                     | grep -vE "path:[[:space:]]*[^[:space:]]*${hpre}" \
                     | grep -vqE "^[0-9]+:[[:space:]]*[A-Z][A-Z0-9_]*:[[:space:]]"; then
                  note "$wf references the PR-head checkout ($hp) outside its path:/env — a reviewer must only READ head (pass it as an env dir), never cd/run into it."
                fi
              fi
            fi

            if printf '%s\n' "$S" | grep -nE 'npm[[:space:]]+(ci|install)' | grep -vqF -- '--ignore-scripts'; then
              note "$wf runs npm ci/install without --ignore-scripts — a malicious dependency install hook could run with the elevated token."
            fi
          done

          # 3. Reviewer scripts must not introduce a shell / eval / file-write / network sink.
          srcs=()
          for f in .github/ai-reviewer*/*.mjs; do
            case "$f" in *.test.mjs) ;; *) srcs+=("$f") ;; esac
          done
          if [ ${#srcs[@]} -gt 0 ]; then
            if grep -nE 'child_process|execSync|new Function|\beval\(|writeFile|appendFile|[^.[:alnum:]_]spawn\(|[^.[:alnum:]_]fetch\(' "${srcs[@]}"; then
              note "A reviewer script introduced a shell/eval/file-write/network sink. With contents:write this can become a repo-compromise vector — remove it, or if genuinely needed, justify it and update this guard's allowlist."
            fi
          fi

          if [ "$fail" -ne 0 ]; then
            echo "::error::ai-reviewer security invariant violated — see errors above. See ai-reviewer.yml SECURITY MODEL."
            exit 1
          fi
          echo "ai-reviewer security invariants OK."
